# Deploy Firebase Hosting after CI succeeds on main (e.g. merge PR → push to main).
#
# Required GitHub secret:
#   FIREBASE_SERVICE_ACCOUNT — JSON key from Firebase Console →
#   Project settings → Service accounts → Generate new private key
#   (role: Firebase Hosting Admin on project mei-trumpet)

name: Deploy Firebase Hosting

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production
    timeout-minutes: 10

    steps:
      - name: Checkout (firebase.json + .firebaserc)
        uses: actions/checkout@v4

      - name: Download production build from CI
        uses: actions/download-artifact@v4
        with:
          name: www
          path: www
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting
        run: npx firebase-tools@13 deploy --only hosting --project mei-trumpet --non-interactive
